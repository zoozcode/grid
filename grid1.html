<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 100vh;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 10px;
        }

        .box{
            background-color: blue;
            padding: 10px;
        }

        .box:first-child{
            grid-row: 1/ span 5;
        }

        .box:nth-child(2){
            grid-column: 2/ span 2;
            grid-row: 1 / span 2;
        }

        .box:nth-child(3){
            grid-column: 4/ span 3;
            grid-row: 1/span 2;
        }

        .box:nth-child(4){
            grid-column: 2 / span 5;
        }

        .box:nth-child(5){
            grid-column: 2 / span 2;
            grid-row: 4 / span 2;
        }

        .box:nth-child(6){
            grid-row: 4/ span 2;
        }
        .box:nth-child(7){
            grid-row: 4/ span 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
    </div>
</body>
</html>
